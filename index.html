<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRS Project - Auth System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="register-box">
            <h2>User Registration</h2>
            <input type="email" id="reg-email" placeholder="Enter Email">
            <input type="password" id="reg-pass" placeholder="Enter Password">
            <button onclick="register()">Register</button>
            <p>Already have an account? <span onclick="showLogin()">Login here</span></p>
        </div>

        <div id="login-box" style="display: none;">
            <h2>User Login</h2>
            <input type="email" id="login-email" placeholder="Enter Email">
            <input type="password" id="login-pass" placeholder="Enter Password">
            <button onclick="login()">Login</button>
            <p>Don't have an account? <span onclick="showRegister()">Register here</span></p>
        </div>

        <div id="dashboard" style="display: none;">
            <h2>Welcome to Dashboard!</h2>
            <p id="user-display"></p>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
